title: 준서의 클라우드/DevOps 블로그
author: Junseo Yeo
email: duwnstj12@naver.com
description: >-
  AWS, DevOps, FinOps 및 트러블슈팅 기록을 남기는 포트폴리오 블로그입니다.

theme: jekyll-theme-chirpy

url: "https://duwnstj.github.io"
baseurl: "/duwnstj12.github.io"

lang: ko-KR
timezone: Asia/Seoul

plugins:
  - jekyll-paginate
  - jekyll-redirect-from
  - jekyll-archives
  - jekyll-sitemap

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

collections:
  tabs:
    output: true
    sort_by: order

paginate: 10

avatar: https://github.com/duwnstj.png

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      category: "Tech Log"
      comments: true

comments:
  active: giscus
  giscus:
    repo: duwnstj/duwnstj12.github.io
    repo_id: "R_kgDOTFiM8w"
    category: "Announcements"
    category_id: "DIC_kwDOTFiM884C_6hT"
    mapping: pathname
    strict: 0
    reactions_enabled: 1
    emit_metadata: 0
    input_position: bottom
    theme: preferred_color_scheme
    lang: ko

social:
  name: Junseo Yeo
  email: duwnstj12@naver.com
  links:
    - https://github.com/duwnstj
